

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>ADVERSARIAL WONDERLAND AND THE ENDING OF A UNIVERSE</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .viewer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: cursor 0.3s ease;
        }

        .viewer-container.idle {
            cursor: none;
        }

        .media-asset {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, object-fit 0.3s ease;
            will-change: opacity, object-fit;
        }

        .media-asset.active {
            opacity: 1;
            visibility: visible;
        }

        /* View Modes */
        .mode-contain { object-fit: contain; }
        .mode-cover { object-fit: cover; }

        /* =========================================
           UI LINKS (Left & Right)
        ========================================= */

        /* Buy Link with Sparkle Shimmer */
        .buy-link {
            position: absolute;
            left: 2em;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            z-index: 50;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            
            /* Gold Shimmer Effect */
            background: linear-gradient(90deg, #ffffff 0%, #ffd700 25%, #ffffff 50%, #ffd700 75%, #ffffff 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Subtle Early Internet Glitch Link */
        .unsubscribe-link {
            position: absolute;
            right: 2em;
            top: 50%;
            transform: translateY(-50%);
            color: #0000EE;
            text-decoration: underline;
            font-family: "Times New Roman", Times, serif;
            font-size: 1.1rem;
            z-index: 50;
            cursor: pointer;
            animation: glitch-flicker-subtle 6s infinite;
        }

        @keyframes glitch-flicker-subtle {
            0%, 100% { color: #0000EE; opacity: 1; text-shadow: none; transform: translateY(-50%) skewX(0deg); }
            2% { color: #551A8B; opacity: 0.9; }
            3% { color: #0000EE; }
            35% { color: #0000EE; opacity: 1; text-shadow: none; }
            36% { color: #FF0000; opacity: 0.8; text-shadow: 1px 0 #0000EE; transform: translateY(-50%) skewX(-5deg); }
            37% { color: #0000EE; opacity: 1; text-shadow: none; transform: translateY(-50%) skewX(0deg); }
            70% { opacity: 1; }
            71% { opacity: 0.4; }
            72% { opacity: 1; }
            95% { color: #0000EE; transform: translateY(-50%); }
            96% { color: #0000EE; transform: translateY(-50%) translateX(1px); }
            97% { color: #0000EE; transform: translateY(-50%); }
        }

        /* =========================================
           PURCHASE MODAL UI
        ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            cursor: default;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #18181b; /* Dark slate */
            color: #e4e4e7;
            padding: 2.5em;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            position: relative;
            border: 1px solid #27272a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            color: #a1a1aa;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ffffff;
        }

        .modal-title {
            margin-bottom: 1.5em;
            font-size: 1.5rem;
            color: #ffffff;
            font-weight: 600;
        }

        .product-details {
            background: #000000;
            padding: 1.25em;
            border-radius: 8px;
            margin-bottom: 1.5em;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #a1a1aa;
        }

        .product-details h3 {
            color: #ffffff;
            font-size: 1rem;
            margin-bottom: 0.5em;
        }

        .product-details ul {
            list-style-type: disc;
            padding-left: 1.5em;
            margin-top: 0.5em;
        }

        .size-selector {
            display: flex;
            flex-direction: column;
            gap: 0.75em;
            margin-bottom: 2em;
        }

        .size-option {
            display: flex;
            align-items: center;
            background: #27272a;
            padding: 1em;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: border-color 0.2s, background 0.2s;
        }

        .size-option:hover {
            background: #3f3f46;
        }

        /* Checkbox styling */
        .size-option input[type="radio"] {
            margin-right: 1em;
            accent-color: #ffd700; /* Gold to match the sparkle */
            transform: scale(1.2);
        }

        .checkout-btn {
            display: block;
            width: 100%;
            padding: 1em;
            background: #ffffff;
            color: #000000;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            border-radius: 6px;
            transition: background 0.2s, transform 0.1s;
        }

        .checkout-btn:hover {
            background: #e4e4e7;
        }

        .checkout-btn:active {
            transform: scale(0.98);
        }
    </script>

<body>

            'odesssej_the_output_tricks_the_AI_models_neural_networks_into_b_e3b52628-4ae2-4dd7-800f-11a1d9ba5442.png',
            'odesssej_the_output_tricks_the_AI_models_neural_networks_into_b_e7fb0b9b-74ef-4010-900d-ae8eac456fe2.png',
            'odesssej_the_output_tricks_the_AI_models_neural_networks_into_b_eb04b346-7c0d-4632-b9c8-636dfabfb976.png',
            'odesssej_the_output_tricks_the_AI_models_neural_networks_into_b_ec41244d-f83c-4175-829c-9da878e3df71.png',
            'odesssej_the_output_tricks_the_AI_models_neural_networks_into_b_efe094d0-578b-40bb-9378-d53ccd8f552b.png',
            'odesssej_the_output_tricks_the_AI_models_neural_networks_into_b_fe523d39-26c4-4630-b7f0-9f74a2ebaa1a.png'
        ];

        // ==========================================
        // 2. STATE & REFERENCES
        // ==========================================
        let isExpandedCover = true;
        let idleTimer;
        let slideshowTimer;
        const SLIDESHOW_INTERVAL_MS = 100000; 
        
        const viewer = document.getElementById('viewer');
        const imageViewer = document.getElementById('image-viewer');
        const videoViewer = document.getElementById('video-viewer');
        const unsubscribeBtn = document.getElementById('unsubscribe-btn');
        
        // Modal references
        const buyBtn = document.getElementById('buy-btn');
        const modal = document.getElementById('purchase-modal');
        const closeModal = document.getElementById('close-modal');
        const modalContent = document.querySelector('.modal-content');

        function isVideo(filename) {
            return filename.toLowerCase().endsWith('.mp4') || filename.toLowerCase().endsWith('.webm');
        }

        // ==========================================
        // 3. CORE LOGIC: LOAD RANDOM ASSET
        // ==========================================
        function loadRandomAsset() {
            if (ASSET_FILES.length === 0) return;

            const randomIndex = Math.floor(Math.random() * ASSET_FILES.length);
            const filename = ASSET_FILES[randomIndex];
            const fileUrl = CDN_BASE_URL + filename;

            if (isVideo(filename)) {
                videoViewer.src = fileUrl;
                videoViewer.onloadeddata = () => {
                    videoViewer.classList.add('active');
                };
                
                const playPromise = videoViewer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => console.warn("Autoplay prevented:", error));
                }
            } else {
                imageViewer.src = fileUrl;
                imageViewer.onload = () => {
                    imageViewer.classList.add('active');
                };
            }
            
            resetSlideshowTimer();
        }

        function transitionToNextAsset() {
            imageViewer.classList.remove('active');
            videoViewer.classList.remove('active');

            setTimeout(() => {
                if (!isExpandedCover) {
                    isExpandedCover = true;
                    imageViewer.classList.replace('mode-contain', 'mode-cover');
                    videoViewer.classList.replace('mode-contain', 'mode-cover');
                }
                loadRandomAsset();
            }, 400); 
        }

        function resetSlideshowTimer() {
            clearTimeout(slideshowTimer);
            slideshowTimer = setTimeout(transitionToNextAsset, SLIDESHOW_INTERVAL_MS);
        }

        // ==========================================
        // 4. DISPLAY MODE TOGGLE
        // ==========================================
        function toggleDisplayMode() {
            // Prevent toggling if modal is open
            if (modal.classList.contains('show')) return;

            isExpandedCover = !isExpandedCover;
            const mode = isExpandedCover ? 'mode-cover' : 'mode-contain';
            const removeMode = isExpandedCover ? 'mode-contain' : 'mode-cover';

            imageViewer.classList.replace(removeMode, mode);
            videoViewer.classList.replace(removeMode, mode);
            
            resetIdleTimer();
        }

        // ==========================================
        // 5. IDLE TIMER
        // ==========================================
        function resetIdleTimer() {
            viewer.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                // Don't hide cursor if modal is open
                if (!modal.classList.contains('show')) {
                    viewer.classList.add('idle');
                }
            }, 2500);
        }
        
        window.addEventListener('mousemove', resetIdleTimer);
        window.addEventListener('keydown', resetIdleTimer);

        // ==========================================
        // 6. EVENT LISTENERS
        // ==========================================
        
        // Viewer interactions
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') toggleDisplayMode();
        });

        viewer.addEventListener('click', toggleDisplayMode);

        unsubscribeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // Modal interactions
        buyBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevents image resizing toggle
            modal.classList.add('show');
            clearTimeout(slideshowTimer); // Pause slideshow so it doesn't change while shopping
            resetIdleTimer();
        });

        closeModal.addEventListener('click', (e) => {
            e.stopPropagation();
            modal.classList.remove('show');
            resetSlideshowTimer(); // Resume slideshow
        });

        modal.addEventListener('click', (e) => {
            e.stopPropagation();
            // Close if clicking the dark overlay outside the modal box
            if (e.target === modal) {
                modal.classList.remove('show');
                resetSlideshowTimer();
            }
        });

        // Stop clicks inside the modal content from bubbling to the viewer
        modalContent.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            loadRandomAsset();
            resetIdleTimer();
            unsubscribeBtn.href = window.location.href;
        });
    </script>
