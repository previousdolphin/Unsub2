<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSUBSCRIBE THE GAME</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --accent-color: #ff4757;
            --font-family: 'Courier New', Courier, monospace;
            --border-radius: 0px;
            --border-width: 2px;
            --shadow-offset: 10px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; 
            margin: 0;
            overflow-x: hidden; 
            transition: all 0.5s ease;
        }

        .screen {
            display: none; 
            text-align: center;
            border: var(--border-width) solid var(--text-color);
            border-radius: var(--border-radius);
            padding: 30px;
            width: 90%; 
            max-width: 450px;
            min-height: 300px;
            margin: 40px auto; 
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--accent-color);
            position: relative; 
            background-color: var(--bg-color);
            transition: all 0.3s ease;
        }

        .screen.active {
            display: block; 
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            background: transparent;
            color: var(--text-color);
            border: var(--border-width) solid var(--text-color);
            border-radius: var(--border-radius);
            padding: 12px 15px;
            margin: 8px 0;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            width: 100%; 
            transition: all 0.2s;
            word-wrap: break-word;
        }

        button:hover:not(:disabled) {
            background: var(--text-color);
            color: var(--bg-color);
            border-color: var(--bg-color);
            box-shadow: inset 0 0 0 50px var(--text-color);
        }

        button:disabled {
            cursor: wait;
        }

        .egg {
            cursor: pointer;
            position: absolute;
            font-size: 24px;
            user-select: none;
            z-index: 10;
            opacity: 0.12; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0px 0px 15px 5px rgba(255, 255, 255, 0.15);
            transition: opacity 0.2s, transform 0.2s;
        }
        
        .egg:hover {
            opacity: 1;
            transform: scale(1.15);
        }

        .hash-string {
            font-family: 'Courier New', monospace; 
            font-size: 1.2rem;
            letter-spacing: 2px;
            word-break: break-all;
            color: var(--accent-color);
            margin: 10px 0 20px 0;
            padding: 15px;
            border: 1px dashed var(--text-color);
        }
        
        .hash-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 20px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="screen-unsubscribe" class="screen">
        <h2>Egg Found.</h2>
        <p>System integrity compromised. Ready to descend.</p>
        <button onclick="loopGame()">UNSUBSCRIBE & DESCEND</button>
    </div>

    <script>
        let currentLevel = 1;
        const maxClicks = 5; 

        const baseThemes = [
            { bg: '#1a1a1a', text: '#f0f0f0', accent: '#ff4757', font: '"Courier New", Courier, monospace', radius: '0px', bWidth: '2px', shadow: '10px' }, 
            { bg: '#f0f0f0', text: '#1a1a1a', accent: '#3742fa', font: 'Arial, sans-serif', radius: '8px', bWidth: '1px', shadow: '5px' },             
            { bg: '#052000', text: '#2ed573', accent: '#ffa502', font: '"Lucida Console", Monaco, monospace', radius: '0px', bWidth: '3px', shadow: '0px' }, 
            { bg: '#2c2c54', text: '#ffb142', accent: '#ff5252', font: 'Tahoma, sans-serif', radius: '15px', bWidth: '4px', shadow: '8px' },
            { bg: '#300000', text: '#ff9ff3', accent: '#00d8d6', font: '"Comic Sans MS", cursive, sans-serif', radius: '30px', bWidth: '5px', shadow: '15px' } 
        ];

        const fontPool = [
            'Georgia, serif', '"Palatino Linotype", serif', '"Times New Roman", serif', 'Arial, sans-serif', 
            '"Arial Black", sans-serif', '"Comic Sans MS", cursive', 'Impact, sans-serif', 'Tahoma, sans-serif',
            '"Trebuchet MS", sans-serif', 'Verdana, sans-serif', '"Courier New", monospace', '"Lucida Console", monospace'
        ];

        // --- SEMANTIC MENU HIERARCHY ---
        // Level 1: Categories
        const categories = ["Audio", "Video", "Gameplay", "Controls", "Accessibility", "UI/HUD", "Network"];
        
        // Level 2: Subcategories (Contextual)
        const subCategories = {
            "Audio": ["Master Mix", "Output Device", "Spatial Audio", "Voice Chat", "Volume Levels"],
            "Video": ["Display Mode", "Graphics Quality", "Post-Processing", "Advanced Rendering", "Refresh Rates"],
            "Gameplay": ["Difficulty Tuning", "Camera Setup", "Game Rules", "Progression Sync"],
            "Controls": ["Keybinds", "Mouse/Keyboard", "Controller Config", "Deadzone Tuning", "Haptic Setup"],
            "Accessibility": ["Visual Aids", "Audio Aids", "Motor Aids", "Colorblind Filters", "Subtitle Config"],
            "UI/HUD": ["Crosshair Config", "Mini-map Scale", "Telemetry Overlay", "Menu Animations"],
            "Network": ["Matchmaking Region", "Server Browser", "Ping Limits", "Port Forwarding"]
        };

        // Level 3+: Specific Leaf Options
        const leafOptions = {
            "Audio": ["Master Volume", "SFX Volume", "Music Volume", "Dialogue Volume", "Audio Ducking", "Binaural Mix", "Mic Input", "Push to Talk"],
            "Video": ["Resolution", "V-Sync", "DLSS Setting", "FSR Setting", "Raytracing (Beta)", "Texture Quality", "Shadow Resolution", "Anti-Aliasing", "Particle Effects", "Volumetric Lighting", "FOV Slider", "Motion Blur", "Film Grain", "Chromatic Aberration", "HDR Calibration", "Gamma Adjustment"],
            "Gameplay": ["Aim Assist", "Auto-Save Interval", "Gore Toggle", "Profanity Filter", "Streamer Mode", "Head Bob"],
            "Controls": ["Invert X-Axis", "Invert Y-Axis", "Sensitivity", "Legacy Controls", "Hardware Acceleration"],
            "Accessibility": ["Daltonization", "Protanopia Filters", "Deuteranopia Filters", "Tritanopia Filters", "Tinnitus Simulation", "Arachnophobia Mode", "Screen Shake", "Flashbang Brightness"],
            "UI/HUD": ["Text Size", "UI Scale", "Chat Visibility", "Damage Numbers", "Subtitle Background"],
            "Network": ["Crossplay Toggle", "Nat Type Config", "Block List", "Report Player", "Cloud Save Sync"]
        };

        // Generic Abstract Options (Can appear anywhere deep)
        const genericOptions = [
            "Advanced Configuration", "Debug Overlay", "Experimental Features", "Restore Defaults", 
            "Sync to Cloud", "Telemetry Data", "Analytics Opt-Out", "Hardware Benchmark", 
            "API Token", "Misc Options", "Do Not Click"
        ];

        function toRoman(num) {
            let result = '';
            const roman = [
                {v: 1000, s: 'M'}, {v: 900, s: 'CM'}, {v: 500, s: 'D'}, {v: 400, s: 'CD'},
                {v: 100, s: 'C'}, {v: 90, s: 'XC'}, {v: 50, s: 'L'}, {v: 40, s: 'XL'},
                {v: 10, s: 'X'}, {v: 9, s: 'IX'}, {v: 5, s: 'V'}, {v: 4, s: 'IV'}, {v: 1, s: 'I'}
            ];
            for (let i = 0; i < roman.length; i++) {
                while (num >= roman[i].v) {
                    result += roman[i].s;
                    num -= roman[i].v;
                }
            }
            return result;
        }

        function getDeterministicRandom(seed) {
            let x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        function generateLevelHash(level) {
            let seed = level * 9999;
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let hash = '';
            for (let i = 0; i < 16; i++) {
                seed++;
                let rand = getDeterministicRandom(seed);
                hash += chars.charAt(Math.floor(rand * chars.length));
            }
            return hash;
        }

        function getThemeForLevel(level) {
            if (level <= baseThemes.length) {
                return baseThemes[level - 1];
            }
            let seed = level * 1337; 
            let rand = () => { seed++; return getDeterministicRandom(seed); };

            let isDark = rand() > 0.5;
            let hue = Math.floor(rand() * 360);
            let bgLightness = isDark ? 5 + Math.floor(rand() * 10) : 85 + Math.floor(rand() * 10);
            let textLightness = isDark ? 85 + Math.floor(rand() * 10) : 5 + Math.floor(rand() * 10);
            let saturation = 10 + Math.floor(rand() * 40);
            let accentHue = (hue + 120 + Math.floor(rand() * 120)) % 360;

            let radiusInt = Math.floor(rand() * 40); 
            let radius = rand() > 0.3 ? `${radiusInt}px` : '0px'; 
            let bWidth = Math.floor(rand() * 5) + 1 + 'px'; 
            let shadow = Math.floor(rand() * 20) + 'px'; 
            let font = fontPool[Math.floor(rand() * fontPool.length)];

            return {
                bg: `hsl(${hue}, ${saturation}%, ${bgLightness}%)`,
                text: `hsl(${hue}, ${saturation}%, ${textLightness}%)`,
                accent: `hsl(${accentHue}, 80%, 60%)`,
                font: font,
                radius: radius,
                bWidth: bWidth,
                shadow: shadow
            };
        }

        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(screenId);
            if(target) target.classList.add('active');
        }

        function generateLevel() {
            const container = document.getElementById('game-container');
            container.innerHTML = ""; 

            const targetDepth = Math.min(currentLevel, maxClicks);
            let mainTitle = currentLevel === 1 ? "UNSUBSCRIBE" : "UNSUBSCRIBE " + toRoman(currentLevel);

            let idCounter = 0;
            // semType tracks the semantic path of the menu branch
            let queue = [{ id: 'main', depth: 0, title: mainTitle, subtitle: 'The Game', semType: 'main' }];
            let leafNodes = []; 

            // --- BUILD STATIC LOAD SCREEN ---
            let loadScreen = document.createElement('div');
            loadScreen.className = 'screen';
            loadScreen.id = 'screen-load';
            
            let loadTitle = document.createElement('h2');
            loadTitle.innerText = "Select Save Data";
            loadScreen.appendChild(loadTitle);

            for(let i=1; i<=3; i++) {
                let slotBtn = document.createElement('button');
                slotBtn.innerText = `Save Slot ${i} - [Empty]`;
                slotBtn.onclick = () => {
                    slotBtn.innerText = `ERROR: Slot ${i} Corrupted`;
                    slotBtn.style.color = "var(--accent-color)";
                };
                loadScreen.appendChild(slotBtn);
            }

            if (currentLevel >= 10) {
                let secLabel = document.createElement('p');
                secLabel.className = 'hash-label';
                secLabel.innerText = "LOCAL CACHE RECOVERED:";
                loadScreen.appendChild(secLabel);
                
                let secHash = document.createElement('div');
                secHash.className = 'hash-string';
                secHash.innerText = generateLevelHash(currentLevel);
                loadScreen.appendChild(secHash);
            }

            let loadBack = document.createElement('button');
            loadBack.innerText = "< Return";
            loadBack.onclick = () => nav('screen-main');
            loadScreen.appendChild(loadBack);
            container.appendChild(loadScreen);


            // --- BUILD DYNAMIC MENU TREE ---
            while(queue.length > 0) {
                let current = queue.shift();
                
                let screenDiv = document.createElement('div');
                screenDiv.className = 'screen';
                screenDiv.id = 'screen-' + current.id;
                if(current.id === 'main') screenDiv.classList.add('active');
                
                let title = document.createElement('h2');
                title.innerText = current.title;
                screenDiv.appendChild(title);

                if(current.subtitle) {
                    let sub = document.createElement('p');
                    sub.innerText = current.subtitle;
                    screenDiv.appendChild(sub);
                }

                if (current.id === 'main') {
                    // 1. Play Button Logic (Interactive Loading)
                    let playBtn = document.createElement('button');
                    playBtn.innerText = "Play 'Indie Game Shell'";
                    playBtn.onclick = () => {
                        if (playBtn.disabled) return;
                        playBtn.innerText = "Loading...";
                        playBtn.disabled = true;
                        playBtn.style.opacity = "0.7";
                        
                        setTimeout(() => {
                            playBtn.innerText = "ERROR: File Missing";
                            playBtn.style.color = "var(--accent-color)";
                            playBtn.style.opacity = "1";
                            
                            setTimeout(() => {
                                playBtn.innerText = "Play 'Indie Game Shell'";
                                playBtn.style.color = "var(--text-color)";
                                playBtn.disabled = false;
                            }, 1500); 
                        }, 800);
                    };
                    screenDiv.appendChild(playBtn);

                    // 2. Load Button
                    let mainLoadBtn = document.createElement('button');
                    mainLoadBtn.innerText = "Load Game";
                    mainLoadBtn.onclick = () => nav('screen-load');
                    screenDiv.appendChild(mainLoadBtn);

                    // 3. Settings Button & Root Branching
                    idCounter++;
                    let childId = 'menu_' + idCounter;
                    let settingsBtn = document.createElement('button');
                    settingsBtn.innerText = "Settings";
                    settingsBtn.onclick = () => nav('screen-' + childId);
                    screenDiv.appendChild(settingsBtn);

                    if (current.depth < targetDepth) {
                        queue.push({ id: childId, depth: current.depth + 1, title: 'Settings', parentId: current.id, semType: 'settings_root' });
                    } else if (current.depth === targetDepth) {
                        // Edge case if depth is 0 (won't happen with min level 1, but safe)
                        leafNodes.push(screenDiv); 
                    }
                } 
                else {
                    let numChildren = 0;
                    if (current.depth < targetDepth) {
                        numChildren = Math.floor(getDeterministicRandom(currentLevel * 1000 + idCounter) * 3) + 1; 
                    } else if (current.depth === targetDepth) {
                        leafNodes.push(screenDiv); 
                    }

                    for(let i=0; i < numChildren; i++) {
                        idCounter++;
                        let childId = 'menu_' + idCounter;
                        let childTitle = "";
                        let childSemType = current.semType;
                        
                        let randSeed = (currentLevel * 10000) + idCounter + i;
                        let randVal = getDeterministicRandom(randSeed);

                        // Semantic Routing Logic
                        if (current.semType === 'settings_root') {
                            // First layer under settings: pick a Category
                            childSemType = categories[Math.floor(randVal * categories.length)];
                            childTitle = childSemType;
                        } 
                        else if (categories.includes(current.semType)) {
                            // Deeper layers: branch out based on parent Category
                            if (current.depth === 2) {
                                // Depth 2 usually maps to subcategories
                                let subPool = subCategories[current.semType];
                                childTitle = subPool[Math.floor(randVal * subPool.length)];
                            } else {
                                // Depth 3+ maps to specific settings or generic abstract garbage
                                if (randVal > 0.8) {
                                    childTitle = genericOptions[Math.floor(randVal * genericOptions.length)];
                                } else {
                                    let leafPool = leafOptions[current.semType];
                                    childTitle = leafPool[Math.floor(randVal * leafPool.length)];
                                }
                            }
                        }

                        let btn = document.createElement('button');
                        btn.innerText = childTitle;
                        btn.onclick = () => nav('screen-' + childId);
                        screenDiv.appendChild(btn);
                        
                        queue.push({ id: childId, depth: current.depth + 1, title: childTitle, parentId: current.id, semType: childSemType });
                    }
                }

                if (current.parentId && current.id !== 'screen-load') {
                    let backBtn = document.createElement('button');
                    backBtn.innerText = "< Back";
                    backBtn.onclick = () => nav('screen-' + current.parentId);
                    screenDiv.appendChild(backBtn);
                }

                container.appendChild(screenDiv);
            }

            // --- HIDE THE EGG ---
            if (leafNodes.length > 0) {
                let targetScreen = leafNodes[Math.floor(Math.random() * leafNodes.length)];
                
                let egg = document.createElement('div');
                egg.className = 'egg';
                egg.innerText = '🥚';
                egg.onclick = () => nav('screen-unsubscribe');
                
                egg.style.bottom = Math.floor(Math.random() * 70) + 10 + "%";
                egg.style.right = Math.floor(Math.random() * 70) + 10 + "%";
                
                targetScreen.appendChild(egg);
            }
        }

        function loopGame() {
            currentLevel++;
            
            const newTheme = getThemeForLevel(currentLevel);
            
            document.documentElement.style.setProperty('--bg-color', newTheme.bg);
            document.documentElement.style.setProperty('--text-color', newTheme.text);
            document.documentElement.style.setProperty('--accent-color', newTheme.accent);
            document.documentElement.style.setProperty('--font-family', newTheme.font);
            document.documentElement.style.setProperty('--border-radius', newTheme.radius);
            document.documentElement.style.setProperty('--border-width', newTheme.bWidth);
            document.documentElement.style.setProperty('--shadow-offset', newTheme.shadow);

            generateLevel();
            nav('screen-main');
        }

        generateLevel();
    </script>
</body>
</html>
