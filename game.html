<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSUBSCRIBE THE GAME</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --accent-color: #ff4757;
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            opacity: 0.7;
            font-weight: bold;
        }

        .screen {
            display: none; 
            text-align: center;
            border: 2px solid var(--text-color);
            padding: 40px;
            width: 450px;
            min-height: 300px;
            box-shadow: 10px 10px 0px var(--accent-color);
            position: relative; /* So the egg can be absolute inside it */
        }

        .screen.active {
            display: block; 
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 10px 20px;
            margin: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            width: 80%;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--text-color);
            color: var(--bg-color);
            border-color: var(--bg-color);
        }

        .egg {
            cursor: pointer;
            opacity: 0.05; 
            position: absolute;
            font-size: 24px;
            user-select: none;
            transition: opacity 0.2s;
            z-index: 10;
        }
        
        .egg:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="level-indicator">Layer: 1</div>
        <div id="depth-indicator">Max Menu Depth: 1</div>
    </div>

    <!-- Container for the procedurally generated menus -->
    <div id="game-container"></div>

    <!-- THE TRUE GOAL (Static Screen) -->
    <div id="screen-unsubscribe" class="screen">
        <h2>Egg Found.</h2>
        <p>System integrity compromised. Ready to descend.</p>
        <button onclick="loopGame()">UNSUBSCRIBE & DESCEND</button>
    </div>

    <script>
        let currentLevel = 1;
        const maxClicks = 5; // Capped at 5 clicks deep

        const themes = [
            { bg: '#1a1a1a', text: '#f0f0f0', accent: '#ff4757', font: '"Courier New", Courier, monospace' }, 
            { bg: '#f0f0f0', text: '#1a1a1a', accent: '#3742fa', font: 'Arial, sans-serif' },             
            { bg: '#052000', text: '#2ed573', accent: '#ffa502', font: '"Lucida Console", Monaco, monospace' }, 
            { bg: '#2c2c54', text: '#ffb142', accent: '#ff5252', font: 'Tahoma, sans-serif' },
            { bg: '#300000', text: '#ff9ff3', accent: '#00d8d6', font: '"Comic Sans MS", cursive, sans-serif' } 
        ];

        const menuJargon = [
            "Advanced Audio", "Graphics (Deprecated)", "Accessibility", "Keybinds 2", 
            "Cloud Sync", "Developer Tools", "Network Config", "Misc Options", 
            "V-Sync Settings", "Colorblind Mode", "Experimental Features", "Do Not Click"
        ];

        // Core Router
        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(screenId);
            if(target) target.classList.add('active');
        }

        function generateLevel() {
            const container = document.getElementById('game-container');
            container.innerHTML = ""; // Clear old menus

            // Determine difficulty: Depth scales with level, caps at maxClicks (5)
            const targetDepth = Math.min(currentLevel, maxClicks);
            document.getElementById('depth-indicator').innerText = `Max Menu Depth: ${targetDepth}`;

            let idCounter = 0;
            let queue = [{ id: 'main', depth: 0, title: 'UNSUBSCRIBE', subtitle: 'The Game' }];
            let leafNodes = []; // Track nodes at targetDepth to place the egg

            // Breadth-First Generation of the Menu Tree
            while(queue.length > 0) {
                let current = queue.shift();
                
                // Create the DOM element for this menu
                let screenDiv = document.createElement('div');
                screenDiv.className = 'screen';
                screenDiv.id = 'screen-' + current.id;
                if(current.id === 'main') screenDiv.classList.add('active');
                
                let title = document.createElement('h2');
                title.innerText = current.title;
                screenDiv.appendChild(title);

                if(current.subtitle) {
                    let sub = document.createElement('p');
                    sub.innerText = current.subtitle;
                    screenDiv.appendChild(sub);
                }

                // Determine how many sub-menus this screen has
                let numChildren = 0;
                if (current.depth < targetDepth) {
                    // Main menu always has 3 options. Sub-menus have 1-3 random options to prevent exponential explosion.
                    numChildren = current.id === 'main' ? 3 : Math.floor(Math.random() * 3) + 1;
                } else if (current.depth === targetDepth) {
                    // We've reached the bottom of this branch
                    leafNodes.push(screenDiv); 
                }

                let childrenIds = [];
                for(let i=0; i < numChildren; i++) {
                    idCounter++;
                    let childId = 'menu_' + idCounter;
                    childrenIds.push(childId);
                    
                    let childTitle = "";
                    if (current.id === 'main') {
                        if (i === 0) childTitle = "Play 'Indie Game Shell'";
                        if (i === 1) childTitle = "Load Game";
                        if (i === 2) childTitle = "Settings";
                    } else {
                        // Grab a random indie dev menu name
                        childTitle = menuJargon[Math.floor(Math.random() * menuJargon.length)];
                    }
                    
                    queue.push({ id: childId, depth: current.depth + 1, title: childTitle, parentId: current.id });
                }

                // Render the buttons
                childrenIds.forEach((cId, index) => {
                    let btn = document.createElement('button');
                    let childNode = queue.find(q => q.id === cId);
                    btn.innerText = childNode.title;
                    
                    if (current.id === 'main' && index === 0) {
                         btn.onclick = () => { btn.innerText = "ERROR: File Missing"; btn.style.color = "var(--accent-color)"; };
                    } else if (current.id === 'main' && index === 1) {
                         btn.onclick = () => { btn.innerText = "ERROR: Corrupted"; btn.style.color = "var(--accent-color)"; };
                    } else {
                         btn.onclick = () => nav('screen-' + cId);
                    }
                    screenDiv.appendChild(btn);
                });

                // Add a Back Button if it's not the main menu
                if (current.parentId) {
                    let backBtn = document.createElement('button');
                    backBtn.innerText = "< Back";
                    backBtn.onclick = () => nav('screen-' + current.parentId);
                    screenDiv.appendChild(backBtn);
                }

                container.appendChild(screenDiv);
            }

            // --- HIDE THE EGG ---
            // Pick a random leaf node (a menu at the maximum depth generated)
            if (leafNodes.length > 0) {
                let targetScreen = leafNodes[Math.floor(Math.random() * leafNodes.length)];
                
                let egg = document.createElement('div');
                egg.className = 'egg';
                egg.innerText = '🥚';
                egg.onclick = () => nav('screen-unsubscribe');
                
                // Randomize position within the screen
                egg.style.bottom = Math.floor(Math.random() * 70) + 10 + "%";
                egg.style.right = Math.floor(Math.random() * 70) + 10 + "%";
                
                targetScreen.appendChild(egg);
            }
        }

        function loopGame() {
            currentLevel++;
            document.getElementById('level-indicator').innerText = `Layer: ${currentLevel}`;
            
            // Reskin the shell
            const themeIndex = (currentLevel - 1) % themes.length;
            const newTheme = themes[themeIndex];
            
            document.documentElement.style.setProperty('--bg-color', newTheme.bg);
            document.documentElement.style.setProperty('--text-color', newTheme.text);
            document.documentElement.style.setProperty('--accent-color', newTheme.accent);
            document.documentElement.style.setProperty('--font-family', newTheme.font);

            // Re-roll the entire menu tree for the new level
            generateLevel();
            nav('screen-main');
        }

        // Boot the game
        generateLevel();
    </script>
</body>
</html>
