<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSUBSCRIBE THE GAME: ROGUELIKE EDITION</title>
    <style>
        :root {
            /* Base Theme Variables */
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --accent-color: #ff4757;
            --font-family: 'Courier New', Courier, monospace;
            --border-radius: 0px;
            --border-width: 2px;
            --shadow-offset: 10px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            opacity: 0.7;
            font-weight: bold;
        }

        .screen {
            display: none; 
            text-align: center;
            border: var(--border-width) solid var(--text-color);
            border-radius: var(--border-radius);
            padding: 40px;
            width: 450px;
            min-height: 300px;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--accent-color);
            position: relative; 
            background-color: var(--bg-color);
            transition: all 0.3s ease;
        }

        .screen.active {
            display: block; 
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            background: transparent;
            color: var(--text-color);
            border: var(--border-width) solid var(--text-color);
            border-radius: var(--border-radius);
            padding: 10px 20px;
            margin: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            width: 80%;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--text-color);
            color: var(--bg-color);
            border-color: var(--bg-color);
            box-shadow: inset 0 0 0 50px var(--text-color); /* Fill effect */
        }

                .egg {
            cursor: pointer;
            position: absolute;
            font-size: 24px;
            user-select: none;
            z-index: 10;
            
            /* --- THE VISIBILITY IMPROVEMENTS --- */
            
            /* 1. Base Opacity: Raised from 0.05 to 0.12 */
            opacity: 0.12; 
            
            /* 2. Character Shadow (retains outline for contrast) */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4); 
            
            /* 3. Container Halo (crucial for light backgrounds) */
            box-shadow: 0px 0px 15px 5px rgba(255, 255, 255, 0.15);
            
            /* For the scaling animation */
            transition: opacity 0.2s, transform 0.2s ease-out; 
            transform: scale(1);
        }
        
        .egg:hover {
            opacity: 1; /* Fully visible on hover */
            transform: scale(1.15); /* Slightly enlarge to confirm selection */
        }

    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="level-indicator">Layer: 1</div>
        <div id="depth-indicator">Max Menu Depth: 1</div>
    </div>

    <div id="game-container"></div>

    <div id="screen-unsubscribe" class="screen">
        <h2>Egg Found.</h2>
        <p>System integrity compromised. Ready to descend.</p>
        <button onclick="loopGame()">UNSUBSCRIBE & DESCEND</button>
    </div>

    <script>
        let currentLevel = 1;
        const maxClicks = 5; 

        // The starting handcrafted themes you liked
        const baseThemes = [
            { bg: '#1a1a1a', text: '#f0f0f0', accent: '#ff4757', font: '"Courier New", Courier, monospace', radius: '0px', bWidth: '2px', shadow: '10px' }, 
            { bg: '#f0f0f0', text: '#1a1a1a', accent: '#3742fa', font: 'Arial, sans-serif', radius: '8px', bWidth: '1px', shadow: '5px' },             
            { bg: '#052000', text: '#2ed573', accent: '#ffa502', font: '"Lucida Console", Monaco, monospace', radius: '0px', bWidth: '3px', shadow: '0px' }, 
            { bg: '#2c2c54', text: '#ffb142', accent: '#ff5252', font: 'Tahoma, sans-serif', radius: '15px', bWidth: '4px', shadow: '8px' },
            { bg: '#300000', text: '#ff9ff3', accent: '#00d8d6', font: '"Comic Sans MS", cursive, sans-serif', radius: '30px', bWidth: '5px', shadow: '15px' } 
        ];

        // A pool of web-safe fonts for the generator
        const fontPool = [
            'Georgia, serif', '"Palatino Linotype", Book Antiqua, Palatino, serif', '"Times New Roman", Times, serif',
            'Arial, Helvetica, sans-serif', '"Arial Black", Gadget, sans-serif', '"Comic Sans MS", cursive, sans-serif',
            'Impact, Charcoal, sans-serif', '"Lucida Sans Unicode", "Lucida Grande", sans-serif', 'Tahoma, Geneva, sans-serif',
            '"Trebuchet MS", Helvetica, sans-serif', 'Verdana, Geneva, sans-serif', '"Courier New", Courier, monospace',
            '"Lucida Console", Monaco, monospace', 'Papyrus, fantasy', 'Brush Script MT, cursive'
        ];

        const menuJargon = [
            "Advanced Audio", "Graphics (Deprecated)", "Accessibility", "Keybinds 2", 
            "Cloud Sync", "Developer Tools", "Network Config", "Misc Options", 
            "V-Sync Settings", "Colorblind Mode", "Experimental Features", "Do Not Click"
        ];

        // --- DETERMINISTIC RANDOM NUMBER GENERATOR ---
        // This ensures the same level always yields the exact same "random" numbers
        function getDeterministicRandom(seed) {
            let x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        // --- THEME GENERATOR ALGORITHM ---
        function getThemeForLevel(level) {
            // First 5 levels are your hand-crafted favorites
            if (level <= baseThemes.length) {
                return baseThemes[level - 1];
            }

            // Level 6+ triggers procedural generation
            let seed = level * 1337; 
            let rand = () => { seed++; return getDeterministicRandom(seed); };

            // 1. Color Palette Generation (Ensuring Contrast)
            let isDark = rand() > 0.5;
            let hue = Math.floor(rand() * 360);
            
            // Background is either very dark (< 15% lightness) or very bright (> 85%)
            let bgLightness = isDark ? 5 + Math.floor(rand() * 10) : 85 + Math.floor(rand() * 10);
            // Text is the exact opposite lightness
            let textLightness = isDark ? 85 + Math.floor(rand() * 10) : 5 + Math.floor(rand() * 10);
            let saturation = 10 + Math.floor(rand() * 40);

            // Accent color is mathematically offset to pop (Triadic/Complementary)
            let accentHue = (hue + 120 + Math.floor(rand() * 120)) % 360;

            // 2. Shape & Feel Generation
            let radiusInt = Math.floor(rand() * 40); 
            // 30% chance of hard-angles, otherwise curved
            let radius = rand() > 0.3 ? `${radiusInt}px` : '0px'; 
            
            let bWidth = Math.floor(rand() * 5) + 1 + 'px'; // 1px to 5px
            let shadow = Math.floor(rand() * 20) + 'px'; // 0px to 20px
            
            let font = fontPool[Math.floor(rand() * fontPool.length)];

            return {
                bg: `hsl(${hue}, ${saturation}%, ${bgLightness}%)`,
                text: `hsl(${hue}, ${saturation}%, ${textLightness}%)`,
                accent: `hsl(${accentHue}, 80%, 60%)`,
                font: font,
                radius: radius,
                bWidth: bWidth,
                shadow: shadow
            };
        }

        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(screenId);
            if(target) target.classList.add('active');
        }

        function generateLevel() {
            const container = document.getElementById('game-container');
            container.innerHTML = ""; 

            const targetDepth = Math.min(currentLevel, maxClicks);
            document.getElementById('depth-indicator').innerText = `Max Menu Depth: ${targetDepth}`;

            let idCounter = 0;
            let queue = [{ id: 'main', depth: 0, title: 'UNSUBSCRIBE', subtitle: 'The Game' }];
            let leafNodes = []; 

            while(queue.length > 0) {
                let current = queue.shift();
                
                let screenDiv = document.createElement('div');
                screenDiv.className = 'screen';
                screenDiv.id = 'screen-' + current.id;
                if(current.id === 'main') screenDiv.classList.add('active');
                
                let title = document.createElement('h2');
                title.innerText = current.title;
                screenDiv.appendChild(title);

                if(current.subtitle) {
                    let sub = document.createElement('p');
                    sub.innerText = current.subtitle;
                    screenDiv.appendChild(sub);
                }

                if (current.id === 'main') {
                    let playBtn = document.createElement('button');
                    playBtn.innerText = "Play 'Indie Game Shell'";
                    playBtn.onclick = () => { playBtn.innerText = "ERROR: File Missing"; playBtn.style.color = "var(--accent-color)"; };
                    screenDiv.appendChild(playBtn);

                    let loadBtn = document.createElement('button');
                    loadBtn.innerText = "Load Game";
                    loadBtn.onclick = () => { loadBtn.innerText = "ERROR: Corrupted"; loadBtn.style.color = "var(--accent-color)"; };
                    screenDiv.appendChild(loadBtn);

                    idCounter++;
                    let childId = 'menu_' + idCounter;
                    let settingsBtn = document.createElement('button');
                    settingsBtn.innerText = "Settings";
                    settingsBtn.onclick = () => nav('screen-' + childId);
                    screenDiv.appendChild(settingsBtn);

                    if (current.depth < targetDepth) {
                        queue.push({ id: childId, depth: current.depth + 1, title: 'Settings', parentId: current.id });
                    }
                } 
                else {
                    let numChildren = 0;
                    if (current.depth < targetDepth) {
                        numChildren = Math.floor(Math.random() * 3) + 1; 
                    } else if (current.depth === targetDepth) {
                        leafNodes.push(screenDiv); 
                    }

                    for(let i=0; i < numChildren; i++) {
                        idCounter++;
                        let childId = 'menu_' + idCounter;
                        let childTitle = menuJargon[Math.floor(Math.random() * menuJargon.length)];
                        
                        let btn = document.createElement('button');
                        btn.innerText = childTitle;
                        btn.onclick = () => nav('screen-' + childId);
                        screenDiv.appendChild(btn);
                        
                        queue.push({ id: childId, depth: current.depth + 1, title: childTitle, parentId: current.id });
                    }
                }

                if (current.parentId) {
                    let backBtn = document.createElement('button');
                    backBtn.innerText = "< Back";
                    backBtn.onclick = () => nav('screen-' + current.parentId);
                    screenDiv.appendChild(backBtn);
                }

                container.appendChild(screenDiv);
            }

            if (leafNodes.length > 0) {
                let targetScreen = leafNodes[Math.floor(Math.random() * leafNodes.length)];
                
                let egg = document.createElement('div');
                egg.className = 'egg';
                egg.innerText = '🥚';
                egg.onclick = () => nav('screen-unsubscribe');
                
                egg.style.bottom = Math.floor(Math.random() * 70) + 10 + "%";
                egg.style.right = Math.floor(Math.random() * 70) + 10 + "%";
                
                targetScreen.appendChild(egg);
            }
        }

        function loopGame() {
            currentLevel++;
            document.getElementById('level-indicator').innerText = `Layer: ${currentLevel}`;
            
            // Get the theme for this level
            const newTheme = getThemeForLevel(currentLevel);
            
            // Inject the new design specs into CSS Variables
            document.documentElement.style.setProperty('--bg-color', newTheme.bg);
            document.documentElement.style.setProperty('--text-color', newTheme.text);
            document.documentElement.style.setProperty('--accent-color', newTheme.accent);
            document.documentElement.style.setProperty('--font-family', newTheme.font);
            document.documentElement.style.setProperty('--border-radius', newTheme.radius);
            document.documentElement.style.setProperty('--border-width', newTheme.bWidth);
            document.documentElement.style.setProperty('--shadow-offset', newTheme.shadow);

            generateLevel();
            nav('screen-main');
        }

        generateLevel();
    </script>
</body>
</html>
