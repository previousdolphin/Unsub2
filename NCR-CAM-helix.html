<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NCR-CAM | UNIVERSAL DOUBLE HELIX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Load Three.js & WebXR VR Button -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/webxr/VRButton.js"></script>

    <style>
        :root {
            --bg-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            background-color: var(--bg-color);
            font-family: 'Share Tech Mono', monospace;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: crosshair;
        }

        /* Scanline Overlay */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 50, 0.04), rgba(0, 255, 100, 0.01), rgba(0, 150, 255, 0.05));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Float VR Button above everything */
        #VRButton {
            z-index: 100 !important;
            font-family: 'Share Tech Mono', monospace !important;
            border-radius: 0 !important;
            border: 1px solid rgba(255, 51, 0, 0.5) !important;
            background: rgba(0, 0, 0, 0.8) !important;
            color: #ff3300 !important;
            text-shadow: 0 0 5px #ff3300 !important;
            opacity: 0.8 !important;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        const acronyms = [
            "Non-dilutive Capital Reallocation – Corporate Asset Management",
            "Necessary Capital Realization – Conceptual Asset Mechanism",
            "Non-contingent Corporate Revenue – Church of Absolute Money",
            "Nominal Cost Recovery – Corporate Art Market",
            "New Capital Regime – Controlled Asset Movement",
            "Net Cash Return – Consolidated Art Machine",
            "Non-taxable Capital Reserve – Cloistered Asset Mandate",
            "Neutral Corporate Risk – Clinical Asset Method",
            "Necessary Corporate Ruthlessness – Capital Accumulation Model",
            "Narcissistic Capital Retention – Corporate Art Monopoly",
            "Negotiable Currency Rate – Conceptual Art Merger",
            "New Commercial Reality – Corporate Asset Materialization",
            "Net Conceptual Return – Capitalized Art Machine",
            "Necessary Conceptual Ritual – Church of Absolute Mandate",
            "Non-contingent Radical Religion – Church of Absolute Meaning",
            "New Cosmic Resonance – Conceptual Aura Machine",
            "Non-secular Corporate Rite – Church of Absolute Mind",
            "Null Contingency Realm – Cloistered Absolute Method",
            "New Concrete Reality – Corporate Architecture Movement",
            "New Construction Regime – Concrete Art Monument",
            "Neutral Context Reconstruction – Clinical Art Module",
            "Necessary Core Realignment – Conceptual Art Mainframe",
            "Necessary Command Routine – Corporate Action Manual",
            "Non-negotiable Command Rule – Centralized Art Mission",
            "Necessary Crisis Response – Corporate Adaptation Method",
            "New Coherent Rationality – Corporate Algorithm Machine",
            "Narcissistic Control Regime – Corporate Authority Matrix",
            "New Coded Reality – Cipher of Art Meaning",
            "Non-existent Creative Residue – Church of Absolute Mystery",
            "Negative Capability Reserve – Church of Abstract Mind"
        ];

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.0085); 

        const dolly = new THREE.Group();
        scene.add(dolly);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1500);
        camera.position.set(0, 1.6, 0); 
        dolly.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.xr.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        try {
            if (typeof VRButton !== 'undefined') {
                document.body.appendChild(VRButton.createButton(renderer));
            }
        } catch(e) { console.warn("VR Button failed to initialize."); }

        const controller1 = renderer.xr.getController(0);
        dolly.add(controller1);
        const controller2 = renderer.xr.getController(1);
        dolly.add(controller2);

        // Architecture Dimensions
        const CYLINDER_RADIUS = 40;
        const RIBBON_HEIGHT = 5;
        const PITCH = RIBBON_HEIGHT * 2; 
        
        // Use an array of 15 unique materials down the spiral to show all acronyms perfectly
        const NUM_MATERIALS = 15;
        const LOOP_COUNT = 90; // Must be a multiple of NUM_MATERIALS for seamless snapping
        const FALL_SPEED = 18.0; 
        
        let meshRed, meshBlue;
        let redMaterials = [];
        let blueMaterials = [];

        // --- CUSTOM MULTI-MATERIAL SPIRAL GEOMETRY ---
        function createMultiMaterialSpiral(radius, height, pitch, loops, segmentsPerLoop, numMaterials) {
            const geo = new THREE.BufferGeometry();
            const vertices = [];
            const uvs = [];
            const indices = [];

            let indexOffset = 0;

            for (let loop = 0; loop < loops; loop++) {
                const matIndex = loop % numMaterials;
                const startIndex = vertices.length / 3;

                for (let s = 0; s <= segmentsPerLoop; s++) {
                    const angle = (s / segmentsPerLoop) * Math.PI * 2;
                    const x = radius * Math.cos(angle);
                    const z = radius * Math.sin(angle);
                    
                    const globalSegment = loop * segmentsPerLoop + s;
                    const yOffset = (globalSegment / segmentsPerLoop) * pitch;

                    vertices.push(x, yOffset, z);
                    
                    // Native mapping: s / segmentsPerLoop (0.0 to 1.0)
                    uvs.push(s / segmentsPerLoop, 0);

                    vertices.push(x, yOffset + height, z);
                    uvs.push(s / segmentsPerLoop, 1);
                }

                for (let s = 0; s < segmentsPerLoop; s++) {
                    const v1 = startIndex + s * 2;
                    const v2 = startIndex + s * 2 + 1;
                    const v3 = startIndex + (s + 1) * 2;
                    const v4 = startIndex + (s + 1) * 2 + 1;

                    indices.push(v1, v2, v4);
                    indices.push(v1, v4, v3);
                }
                
                const numIndices = segmentsPerLoop * 6;
                geo.addGroup(indexOffset, numIndices, matIndex);
                indexOffset += numIndices;
            }

            geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(indices);
            return geo;
        }

        // --- HIGH RESOLUTION TEXTURE GENERATOR ---
        function createTickerMaterials(colorMode, numMaterials) {
            const materials = [];
            const baseHeight = 128;
            const separator = "   NCR-CAM   ";
            const mainColor = colorMode === 'red' ? '#ff3300' : '#00e5ff';
            const dimColor = colorMode === 'red' ? 'rgba(255, 51, 0, 0.9)' : 'rgba(0, 229, 255, 0.9)';
            const bgColor = colorMode === 'red' ? 'rgba(255, 51, 0, 0.04)' : 'rgba(0, 229, 255, 0.03)';
            const lineColor = colorMode === 'red' ? 'rgba(255, 51, 0, 0.2)' : 'rgba(0, 229, 255, 0.2)';

            // Fetch the user's specific graphics limits to prevent crashes
            const maxTexSize = renderer.capabilities.maxTextureSize || 4096;
            let acrIndex = 0;

            for (let i = 0; i < numMaterials; i++) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const items = [];
                let totalWidth = 0;
                ctx.font = '50px "Share Tech Mono", monospace';
                
                // Pack exactly 2 acronyms per texture to bypass mobile resizing limits
                for(let j = 0; j < 2; j++) {
                    const acr = acronyms[acrIndex % acronyms.length].toUpperCase();
                    acrIndex++;
                    const w1 = ctx.measureText(acr).width;
                    const w2 = ctx.measureText(separator).width;
                    items.push({ text: acr, type: 'acr', width: w1 });
                    items.push({ text: separator, type: 'sep', width: w2 });
                    totalWidth += w1 + w2;
                }

                let desiredWidth = Math.ceil(totalWidth);
                let desiredHeight = baseHeight;
                let scaleFactor = 1.0;
                
                if (desiredWidth > maxTexSize) {
                    scaleFactor = maxTexSize / desiredWidth;
                    desiredWidth = maxTexSize;
                    desiredHeight = Math.floor(baseHeight * scaleFactor);
                }

                canvas.width = desiredWidth;
                canvas.height = desiredHeight;

                if (scaleFactor !== 1.0) {
                    ctx.scale(scaleFactor, scaleFactor);
                }

                // Background
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, totalWidth, baseHeight);
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, totalWidth, baseHeight);

                // Borders
                ctx.beginPath();
                ctx.moveTo(0, 2);
                ctx.lineTo(totalWidth, 2);
                ctx.moveTo(0, baseHeight - 2);
                ctx.lineTo(totalWidth, baseHeight - 2);
                ctx.strokeStyle = lineColor;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Text
                ctx.font = '50px "Share Tech Mono", monospace';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = mainColor;
                ctx.shadowBlur = 12;

                let xOffset = 0;
                for(const item of items) {
                    ctx.fillStyle = item.type === 'acr' ? dimColor : 'rgba(255, 255, 255, 0.6)';
                    ctx.fillText(item.text, xOffset, baseHeight / 2);
                    xOffset += item.width;
                }

                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.ClampToEdgeWrapping;
                
                materials.push(new THREE.MeshBasicMaterial({ 
                    map: texture, 
                    side: THREE.BackSide, 
                    transparent: true 
                }));
            }

            return materials;
        }

        let environmentBuilt = false;
        function buildEnvironment() {
            if (environmentBuilt) return;
            environmentBuilt = true;

            const geo = createMultiMaterialSpiral(CYLINDER_RADIUS, RIBBON_HEIGHT, PITCH, LOOP_COUNT, 64, NUM_MATERIALS);
            
            redMaterials = createTickerMaterials('red', NUM_MATERIALS);
            blueMaterials = createTickerMaterials('blue', NUM_MATERIALS);

            meshRed = new THREE.Mesh(geo, redMaterials);
            meshBlue = new THREE.Mesh(geo, blueMaterials);

            const startY = -(LOOP_COUNT * PITCH) / 2;
            meshRed.position.y = startY;
            meshBlue.position.y = startY + RIBBON_HEIGHT;

            scene.add(meshRed);
            scene.add(meshBlue);
        }

        // Font load failsafe
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => buildEnvironment());
        }
        setTimeout(() => buildEnvironment(), 500);


        // --- UNIVERSAL CONTROLS SYSTEM ---
        const moveState = { forward: 0, backward: 0, left: 0, right: 0 };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        
        let pitchRot = 0; 
        let yawRot = 0;   
        let isDragging = false;
        
        document.addEventListener('mousedown', (e) => {
            if(e.target.id === 'VRButton') return;
            isDragging = true;
        });
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (!isDragging || renderer.xr.isPresenting) return;
            yawRot -= e.movementX * 0.003;
            pitchRot -= e.movementY * 0.003;
            pitchRot = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitchRot));
        });

        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'KeyW': moveState.forward = 1; break;
                case 'KeyS': moveState.backward = 1; break;
                case 'KeyA': moveState.left = 1; break;
                case 'KeyD': moveState.right = 1; break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveState.forward = 0; break;
                case 'KeyS': moveState.backward = 0; break;
                case 'KeyA': moveState.left = 0; break;
                case 'KeyD': moveState.right = 0; break;
            }
        });

        const touchState = { leftId: null, rightId: null, leftStartX: 0, leftStartY: 0, rightLastX: 0, rightLastY: 0 };

        document.addEventListener('touchstart', (e) => {
            if(renderer.xr.isPresenting || e.target.id === 'VRButton') return;
            e.preventDefault();
            const halfWidth = window.innerWidth / 2;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.clientX < halfWidth && touchState.leftId === null) {
                    touchState.leftId = touch.identifier;
                    touchState.leftStartX = touch.clientX;
                    touchState.leftStartY = touch.clientY;
                } else if (touch.clientX >= halfWidth && touchState.rightId === null) {
                    touchState.rightId = touch.identifier;
                    touchState.rightLastX = touch.clientX;
                    touchState.rightLastY = touch.clientY;
                }
            }
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            if(renderer.xr.isPresenting) return;
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];

                if (touch.identifier === touchState.leftId) {
                    let dx = touch.clientX - touchState.leftStartX;
                    let dy = touch.clientY - touchState.leftStartY;
                    const maxRadius = 60;
                    let normX = Math.max(-1, Math.min(1, dx / maxRadius));
                    let normY = Math.max(-1, Math.min(1, dy / maxRadius));

                    moveState.forward = normY < 0 ? Math.abs(normY) : 0;
                    moveState.backward = normY > 0 ? normY : 0;
                    moveState.right = normX > 0 ? normX : 0;
                    moveState.left = normX < 0 ? Math.abs(normX) : 0;
                }

                if (touch.identifier === touchState.rightId) {
                    const movementX = touch.clientX - touchState.rightLastX;
                    const movementY = touch.clientY - touchState.rightLastY;

                    yawRot -= movementX * 0.005;
                    pitchRot -= movementY * 0.005;
                    pitchRot = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitchRot));

                    touchState.rightLastX = touch.clientX;
                    touchState.rightLastY = touch.clientY;
                }
            }
        }, {passive: false});

        document.addEventListener('touchend', (e) => {
            if(renderer.xr.isPresenting) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === touchState.leftId) {
                    touchState.leftId = null;
                    moveState.forward = 0; moveState.backward = 0;
                    moveState.left = 0; moveState.right = 0;
                }
                if (touch.identifier === touchState.rightId) {
                    touchState.rightId = null;
                }
            }
        });

        function getVRGamepadInput() {
            let vrX = 0, vrZ = 0;
            const session = renderer.xr.getSession();
            if (session) {
                for (const source of session.inputSources) {
                    if (source.gamepad) {
                        const x = source.gamepad.axes[2] || 0;
                        const z = source.gamepad.axes[3] || 0;
                        if (Math.abs(x) > 0.1) vrX += x;
                        if (Math.abs(z) > 0.1) vrZ += z;
                    }
                }
            }
            return { x: vrX, z: vrZ };
        }


        // --- MAIN RENDER LOOP ---
        const clock = new THREE.Clock();
        
        // Since we map 15 materials sequentially, the pattern perfectly repeats every 15 coils.
        const SNAP_DISTANCE = NUM_MATERIALS * PITCH; 

        function animate() {
            if(!meshRed || !meshBlue) {
                renderer.render(scene, camera);
                return;
            }

            const delta = clock.getDelta();

            // 1. Rotation Tracking
            let moveAngleY = yawRot;
            if (renderer.xr.isPresenting) {
                const camEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
                moveAngleY = camEuler.y;
            } else {
                camera.quaternion.setFromEuler(new THREE.Euler(pitchRot, yawRot, 0, 'YXZ'));
            }

            // 2. Input Tracking
            const vrInput = getVRGamepadInput();
            direction.z = Number(moveState.forward) - Number(moveState.backward) + vrInput.z;
            direction.x = Number(moveState.right) - Number(moveState.left) + vrInput.x;
            direction.normalize();

            if (direction.lengthSq() > 0) {
                velocity.z -= direction.z * 150.0 * delta;
                velocity.x -= direction.x * 150.0 * delta;
            }

            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            const moveVector = new THREE.Vector3(velocity.x * delta, 0, velocity.z * delta);
            moveVector.applyEuler(new THREE.Euler(0, moveAngleY, 0, 'YXZ'));

            dolly.position.x += moveVector.x;
            dolly.position.z += moveVector.z;

            // 3. Cylinder Collision
            dolly.updateMatrixWorld(); 
            const worldCamPos = new THREE.Vector3();
            camera.getWorldPosition(worldCamPos);
            
            const distFromCenter = Math.sqrt(worldCamPos.x * worldCamPos.x + worldCamPos.z * worldCamPos.z);
            const safeRadius = CYLINDER_RADIUS - 3;
            
            if (distFromCenter > safeRadius) {
                const ratio = safeRadius / distFromCenter;
                dolly.position.x = (worldCamPos.x * ratio) - (worldCamPos.x - dolly.position.x);
                dolly.position.z = (worldCamPos.z * ratio) - (worldCamPos.z - dolly.position.z);
            }

            // 4. Infinite Drop Treadmill
            dolly.position.y -= FALL_SPEED * delta;
            
            // Snap back up by exactly the pattern's height to create seamless infinity
            if (dolly.position.y <= -SNAP_DISTANCE) {
                dolly.position.y += SNAP_DISTANCE;
            }

            // 5. Scroll Multi-Materials independently
            redMaterials.forEach(mat => {
                if(mat.map) mat.map.offset.x += 0.08 * delta;
            });
            blueMaterials.forEach(mat => {
                // Scroll in opposite visual direction
                if(mat.map) mat.map.offset.x -= 0.08 * delta;
            });

            renderer.render(scene, camera);
        }

        renderer.setAnimationLoop(animate);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
