<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is the Name of My _?</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <!-- QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        canvas {
            display: block;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 20px 60px rgba(0, 0, 0, 0.9);
            max-width: 100%;
            max-height: 100%;
            background-color: #FFFFFF;
            cursor: default; 
        }

        #loader {
            position: absolute;
            color: #FFF;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
        }

        /* STRICT PRINTING RULES: Forces 8.5x11 Edge-to-Edge */
        @media print {
            @page {
                size: 8.5in 11in;
                margin: 0 !important;
            }
            body, html {
                margin: 0 !important;
                padding: 0 !important;
                background-color: #FFFFFF !important;
            }
            #loader {
                display: none !important;
            }
            canvas {
                width: 8.5in !important;
                height: 11in !important;
                max-width: none !important;
                max-height: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                object-fit: contain;
            }
        }
    </style>
</head>
<body>

<div id="loader">Loading Assets...</div>
<canvas id="posterCanvas" style="opacity: 0; transition: opacity 0.3s ease;"></canvas>

<script>
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const loader = document.getElementById('loader');

    // High-Resolution Base exactly matching 8.5 x 11 aspect ratio
    const POSTER_WIDTH = 1700;
    const POSTER_HEIGHT = 2200;

    const COLOR_BG = '#FFFFFF';
    const COLOR_FG = '#000000';

    let interactiveAreas = [];

    function resizeCanvas() {
        const windowRatio = window.innerWidth / window.innerHeight;
        const posterRatio = POSTER_WIDTH / POSTER_HEIGHT;

        let displayWidth, displayHeight;

        if (windowRatio < posterRatio) {
            displayWidth = window.innerWidth;
            displayHeight = window.innerWidth / posterRatio;
        } else {
            displayHeight = window.innerHeight;
            displayWidth = window.innerHeight * posterRatio;
        }

        const dpr = window.devicePixelRatio || 1;
        canvas.width = POSTER_WIDTH * dpr;
        canvas.height = POSTER_HEIGHT * dpr;
        
        canvas.style.width = `${displayWidth}px`;
        canvas.style.height = `${displayHeight}px`;

        ctx.scale(dpr, dpr);
        drawPoster();
    }

    function drawBoxedText(text, x, y, fontSize, align = 'left', invert = false) {
        ctx.font = `900 ${fontSize}px 'Inter', sans-serif`;
        const textWidth = ctx.measureText(text).width;
        
        const padX = fontSize * 0.3;
        const boxW = textWidth + (padX * 2);
        const boxH = fontSize * 1.25; 
        
        let boxX = x;
        if (align === 'center') {
            boxX = (POSTER_WIDTH / 2) - (boxW / 2);
        } else if (align === 'right') {
            boxX = x - boxW;
        }

        ctx.fillStyle = invert ? COLOR_FG : COLOR_BG;
        ctx.fillRect(boxX, y, boxW, boxH);
        
        ctx.fillStyle = invert ? COLOR_BG : COLOR_FG;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        const textX = boxX + (boxW / 2);
        const textY = y + (boxH / 2) + (fontSize * 0.04);
        
        ctx.fillText(text, textX, textY);
        
        return { w: boxW, h: boxH, right: boxX + boxW, bottom: y + boxH };
    }

    function drawDynamicBlankLine(x, y, fontSize, maxBoxWidth) {
        const qMetrics = drawBoxedText("?", 0, -1000, fontSize); 
        const qBoxW = qMetrics.w;
        const gap = fontSize * 0.15; 
        
        const blankBoxW = maxBoxWidth - qBoxW - gap;
        const boxH = fontSize * 1.25;
        
        ctx.fillStyle = COLOR_FG;
        ctx.fillRect(x, y, blankBoxW, boxH);
        
        ctx.fillStyle = COLOR_BG;
        const linePadX = fontSize * 0.25;
        const lineHeight = fontSize * 0.08;
        ctx.fillRect(x + linePadX, y + boxH - (fontSize * 0.25), blankBoxW - (linePadX * 2), lineHeight);
        
        drawBoxedText("?", x + blankBoxW + gap, y, fontSize, 'left', true);
        
        return { bottom: y + boxH };
    }

    function drawRealQR(centerX, topY, size) {
        ctx.fillStyle = COLOR_BG;
        ctx.fillRect(centerX - size/2 - 10, topY - 10, size + 20, size + 20);

        const qr = new QRious({
            value: 'https://nameofmy.com',
            size: size,
            background: COLOR_BG,
            foreground: COLOR_FG,
            level: 'H' 
        });

        ctx.drawImage(qr.canvas, centerX - size/2, topY, size, size);

        interactiveAreas.push({
            x: centerX - size/2,
            y: topY,
            w: size,
            h: size,
            url: 'https://nameofmy.com'
        });
        
        return { bottom: topY + size };
    }

    function drawPoster() {
        interactiveAreas = []; 
        
        ctx.fillStyle = COLOR_BG;
        ctx.fillRect(0, 0, POSTER_WIDTH, POSTER_HEIGHT);

        const margin = 140;
        const maxSafeWidth = POSTER_WIDTH - (margin * 2);
        
        // STRICT BOTTOM-UP MATH TO PREVENT OVERLAP
        const qrSize = 350;
        const qrGap = 120;
        const urlSize = 100;
        const urlGap = 120;
        const normalSize = 65;
        const normalGap = 20;
        const normalBoxH = normalSize * 1.25;

        // Calculate absolute Y positions anchored to the bottom margin
        const qrY = POSTER_HEIGHT - margin - qrSize;
        const urlY = qrY - qrGap - urlSize;
        const text2Y = urlY - urlGap - normalBoxH;
        const text1Y = text2Y - normalGap - normalBoxH;

        // DYNAMIC TOP TEXT MATH
        // Top block has exactly the space from the top margin down to 100px above text1
        const maxTopBlockHeight = text1Y - margin - 100;
        
        let massiveSize = 400; 
        ctx.font = `900 ${massiveSize}px 'Inter', sans-serif`;
        
        // Scale down until it fits width
        while (ctx.measureText("THE NAME").width + (massiveSize * 0.6) > maxSafeWidth) {
            massiveSize--;
            ctx.font = `900 ${massiveSize}px 'Inter', sans-serif`;
        }
        
        // Scale down until it fits the calculated safe height (4 boxes + 3 gaps)
        const totalHeightRatio = (4 * 1.25) + (3 * 0.15); // 5.45 times the font size
        while ((massiveSize * totalHeightRatio) > maxTopBlockHeight) {
            massiveSize--;
        }

        // Draw Top Block
        let currentY = margin;
        const massiveGap = massiveSize * 0.15;

        let bounds;
        bounds = drawBoxedText("WHAT IS", margin, currentY, massiveSize, 'left', true);
        currentY = bounds.bottom + massiveGap;

        bounds = drawBoxedText("THE NAME", margin, currentY, massiveSize, 'left', true);
        currentY = bounds.bottom + massiveGap;

        bounds = drawBoxedText("OF MY", margin, currentY, massiveSize, 'left', true);
        currentY = bounds.bottom + massiveGap;

        drawDynamicBlankLine(margin, currentY, massiveSize, maxSafeWidth);

        // Draw Bottom Block
        drawBoxedText("We have the object.", POSTER_WIDTH / 2, text1Y, normalSize, 'center', true);
        drawBoxedText("You hold the definition.", POSTER_WIDTH / 2, text2Y, normalSize, 'center', true);

        // Draw URL
        ctx.font = `900 ${urlSize}px 'Inter', sans-serif`;
        ctx.fillStyle = COLOR_FG;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText("NAMEOFMY.COM", POSTER_WIDTH / 2, urlY);

        const urlWidth = ctx.measureText("NAMEOFMY.COM").width;
        ctx.fillRect((POSTER_WIDTH / 2) - (urlWidth / 2), urlY + urlSize, urlWidth, urlSize * 0.1);

        interactiveAreas.push({
            x: (POSTER_WIDTH / 2) - (urlWidth / 2) - 20,
            y: urlY - 20,
            w: urlWidth + 40,
            h: urlSize + 40,
            url: 'https://nameofmy.com'
        });

        // Draw Real QR Code
        drawRealQR(POSTER_WIDTH / 2, qrY, qrSize);
    }

    // Interactive Logic
    function getMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = POSTER_WIDTH / rect.width;
        const scaleY = POSTER_HEIGHT / rect.height;
        
        let clientX = evt.clientX;
        let clientY = evt.clientY;
        
        if (evt.touches && evt.touches.length > 0) {
            clientX = evt.touches[0].clientX;
            clientY = evt.touches[0].clientY;
        }

        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function handleInteraction(evt) {
        const pos = getMousePos(evt);
        for (let area of interactiveAreas) {
            if (pos.x >= area.x && pos.x <= area.x + area.w &&
                pos.y >= area.y && pos.y <= area.y + area.h) {
                window.open(area.url, '_blank');
                break;
            }
        }
    }

    canvas.addEventListener('click', handleInteraction);
    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleInteraction(e.changedTouches[0]);
    });

    canvas.addEventListener('mousemove', (evt) => {
        const pos = getMousePos(evt);
        let hovering = false;
        for (let area of interactiveAreas) {
            if (pos.x >= area.x && pos.x <= area.x + area.w &&
                pos.y >= area.y && pos.y <= area.y + area.h) {
                hovering = true;
                break;
            }
        }
        canvas.style.cursor = hovering ? 'pointer' : 'default';
    });

    document.fonts.ready.then(() => {
        loader.style.display = 'none';
        canvas.style.opacity = 1; 
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    });
</script>

</body>
</html>
