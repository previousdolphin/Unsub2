<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Coke: Oracle System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e2e2e2;
            --text-main: #1a1a1a;
            --text-muted: #555;
            --chat-gradient: linear-gradient(to top, rgba(226,226,226,1) 0%, rgba(226,226,226,0.8) 60%, rgba(226,226,226,0) 100%);
            --msg-user-bg: rgba(0, 0, 0, 0.05);
            --msg-user-border: #1a1a1a;
            --input-bg: #ffffff;
            --input-border: transparent;
            --toggle-color: #1a1a1a;
            --coca-red: #f40009;
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg-color: #0a0a0a;
            --text-main: #e2e2e2;
            --text-muted: #888;
            --chat-gradient: linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0.8) 60%, rgba(10,10,10,0) 100%);
            --msg-user-bg: rgba(255, 255, 255, 0.1);
            --msg-user-border: #e2e2e2;
            --input-bg: #1a1a1a;
            --input-border: transparent;
            --toggle-color: #e2e2e2;
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.4);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden; overflow-y: auto; scroll-snap-type: y proximity;
        }

        canvas {
            display: block; width: 100%; height: 100%;
            position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none;
        }

        .top-controls {
            position: fixed; top: 20px; right: 20px; z-index: 50; display: flex; gap: 15px; align-items: center;
        }

        .icon-btn {
            background: transparent; border: none; cursor: pointer; color: var(--toggle-color);
            padding: 8px; display: flex; align-items: center; justify-content: center;
            transition: color 0.3s ease, transform 0.3s ease; font-family: 'Montserrat', sans-serif;
            font-weight: 700; font-size: 1.1rem;
        }
        .icon-btn:hover { color: var(--coca-red); transform: scale(1.1); }

        .layout-wrapper {
            position: relative; z-index: 10; display: flex; flex-direction: column; min-height: 100vh;
        }

        .logo-section {
            flex: 1 0 auto; display: flex; align-items: center; justify-content: center;
            min-height: 45vh; padding-bottom: 2rem; pointer-events: none; 
        }
        .brand-container { text-align: center; }
        .logo-top {
            font-family: 'Playfair Display', serif; font-size: 8rem; font-weight: 700;
            letter-spacing: -2px; line-height: 0.8; color: var(--coca-red); 
            margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: center;
        }
        .logo-diet {
            font-size: 2.6rem; font-style: italic; margin-bottom: 90px; margin-left: -90px; color: var(--text-main);
        }
        .oracle-text { font-size: 4rem; font-weight: 10; letter-spacing: 3px; line-height: .9; color: var(--text-main); }
        .sub-text { font-size: 1.2rem; font-weight: 600; letter-spacing: 4px; margin-top: 10px; color: var(--text-muted); }

        .interaction-section {
            flex: 0 0 auto; height: 55vh; min-height: 450px; position: relative; scroll-snap-align: start;
        }
        .container-box {
            width: 100%; max-width: 800px; height: 100%; margin: 0 auto;
            display: flex; flex-direction: column; background: var(--chat-gradient);
            padding: 20px 20px 40px 20px; box-sizing: border-box;
        }

        .chat-history {
            flex-grow: 1; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; padding-right: 10px;
        }
        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-thumb { background: var(--coca-red); border-radius: 4px; }

        .message { 
            max-width: 85%; 
            padding: 14px 20px; 
            font-size: 0.95rem; 
            line-height: 1.6; 
            letter-spacing: 0.3px; 
            word-wrap: break-word; 
            white-space: pre-wrap;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }
        .message.user { 
            align-self: flex-end; 
            background-color: var(--msg-user-bg); 
            border-right: 4px solid var(--msg-user-border);
            border-bottom-right-radius: 2px;
        }
        .message.assistant { 
            align-self: flex-start; 
            background-color: rgba(244, 0, 9, 0.08); 
            color: var(--coca-red); 
            border-left: 4px solid var(--coca-red); 
            font-weight: 600; 
            border-bottom-left-radius: 2px;
            backdrop-filter: blur(5px);
        }
        .message.error { 
            align-self: flex-start; 
            background-color: rgba(255, 165, 0, 0.1); 
            color: #ffa500; 
            border-left: 4px solid #ffa500; 
            font-family: monospace; 
            font-size: 0.85rem; 
            border-bottom-left-radius: 2px;
        }
        .message.system { 
            align-self: center; 
            background-color: transparent; 
            color: var(--text-muted); 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: 700; 
            text-align: center;
            box-shadow: none;
            padding: 10px;
        }

        /* MODERN INLINE ACCORDION (Replaces Tooltip) */
        .wilhelm-accordion {
            margin: 15px 0;
            background: rgba(244, 0, 9, 0.05);
            border: 1px solid rgba(244, 0, 9, 0.2);
            border-radius: 8px;
            overflow: hidden;
            text-align: left;
            transition: all 0.3s ease;
        }
        .wilhelm-accordion[open] {
            background: rgba(244, 0, 9, 0.08);
            box-shadow: var(--shadow-sm);
        }
        .wilhelm-summary {
            padding: 12px 15px;
            cursor: pointer;
            color: var(--coca-red);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            list-style: none; /* remove default arrow */
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wilhelm-summary::-webkit-details-marker {
            display: none;
        }
        .wilhelm-summary::after {
            content: '+';
            font-size: 1.2rem;
            line-height: 1;
            transition: transform 0.3s ease;
        }
        .wilhelm-accordion[open] .wilhelm-summary::after {
            content: '−';
            transform: rotate(180deg);
        }
        .wilhelm-content {
            padding: 0 15px 15px 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: var(--text-main);
            line-height: 1.6;
            border-top: 1px solid rgba(244, 0, 9, 0.1);
            margin-top: 5px;
            padding-top: 15px;
            text-transform: none;
            letter-spacing: normal;
        }
        .wilhelm-section {
            margin-bottom: 12px;
        }
        .wilhelm-section:last-child {
            margin-bottom: 0;
        }
        .wilhelm-section strong {
            display: block;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .input-wrapper {
            display: flex; gap: 10px; align-items: center; 
            background: var(--input-bg); 
            border: 1px solid var(--input-border);
            padding: 12px 20px; 
            margin-bottom: env(safe-area-inset-bottom, 10px); 
            border-radius: 30px;
            box-shadow: var(--shadow-md);
        }
        .chat-input { flex-grow: 1; background: transparent; border: none; color: var(--text-main); font-family: 'Montserrat', sans-serif; font-size: 1rem; outline: none; min-width: 0; }
        .chat-input::placeholder { color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; font-size: 0.8rem; font-weight: 600;}
        .btn { background: transparent; border: none; cursor: pointer; color: var(--text-muted); padding: 5px; flex-shrink: 0; transition: color 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .btn:hover:not(:disabled) { color: var(--coca-red); transform: scale(1.05); }
        .btn:disabled { cursor: not-allowed; opacity: 0.5; transform: none; }

        #castContainer { display: none; align-items: center; justify-content: center; flex-direction: column; gap: 30px;}
        .hexagram-visual {
            display: flex; flex-direction: column-reverse; gap: 8px; height: 180px; width: 120px; align-items: center; justify-content: flex-start;
        }
        .hex-line {
            width: 100px; height: 16px; background-color: var(--text-main); transition: all 0.3s ease; opacity: 0; animation: fadeIn 0.5s forwards; border-radius: 2px;
        }
        .hex-line.yin { background-color: transparent; border-left: 40px solid var(--text-main); border-right: 40px solid var(--text-main); width: 20px;}
        .hex-line.changing { background-color: var(--coca-red); border-color: var(--coca-red);}

        .cast-interface { text-align: center; width: 100%; max-width: 500px;}
        .cast-progress { font-weight: 900; letter-spacing: 4px; color: var(--coca-red); margin-bottom: 15px; font-size: 0.9rem;}
        .cast-question { font-size: 1.2rem; font-weight: 600; margin-bottom: 25px; min-height: 60px; transition: opacity 0.4s ease;}
        
        .revelation-text { animation: fadeIn 1.5s forwards; }
        .revelation-num { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 700; color: var(--coca-red); line-height: 1; margin-bottom: 5px; }
        .revelation-name { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; color: var(--text-main); }
        .revelation-lines { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; color: var(--text-muted); margin-top: 15px; }

        .cast-options { display: flex; gap: 15px; justify-content: center; transition: opacity 0.4s ease;}
        .cast-btn {
            flex: 1; padding: 15px; background: transparent; border: 2px solid var(--text-main); color: var(--text-main);
            font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; cursor: pointer;
            transition: all 0.2s ease; letter-spacing: 1px; border-radius: 8px;
        }
        .cast-btn:hover { background: var(--text-main); color: var(--bg-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .logo-top { font-size: 4.5rem; }
            .logo-diet { font-size: 1.5rem; margin-bottom: 55px; margin-left: -50px; }
            .oracle-text { font-size: 2.2rem; }
            .sub-text { font-size: 0.85rem; }
            .container-box { padding: 15px 15px 40px 15px; }
            .cast-question { font-size: 1rem; }
            .cast-btn { font-size: 0.8rem; padding: 10px;}
            .revelation-num { font-size: 2.8rem; }
            .revelation-name { font-size: 1.1rem; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="top-controls">

    <script>
        // --- UI & Canvas Setup ---
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            document.getElementById('moonIcon').style.display = document.body.classList.contains('dark-mode') ? 'none' : 'block';
            document.getElementById('sunIcon').style.display = document.body.classList.contains('dark-mode') ? 'block' : 'none';
        });

        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, points = [];
        const resolution = 20; 
        const mouse = { x: -1000, y: -1000, radius: 200 };

        class Point {
            constructor(x, y) { this.x = x; this.y = y; this.vy = 0; }
            update(targetY) {
                let dy = targetY - this.y;
                this.vy += dy * 0.04; this.vy *= 0.85; this.y += this.vy;
            }
        }

        function initCanvas() {
            width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
            points = [];
            for (let x = -50; x <= width + 50; x += resolution) {
                points.push({ top: new Point(x, height / 2), bottom: new Point(x, height / 2) });
            }
        }

        let time = 0;
        function animate() {
            ctx.clearRect(0, 0, width, height); time += 0.03; 
            points.forEach((p) => {
                const x = p.top.x;
                const sineOffset = Math.sin(x * 0.002 + time) * 40 + Math.sin(x * 0.005 - time * 0.8) * 25;
                const dynamicThickness = 80 + Math.sin(x * 0.003 + time * 1.5) * 40;
                let targetTopY = (height * 0.40) + sineOffset - (dynamicThickness / 2);
                let targetBottomY = (height * 0.40) + sineOffset + (dynamicThickness / 2);

                const dy = mouse.y - ((targetTopY + targetBottomY) / 2);
                if (Math.abs(mouse.x - x) < mouse.radius && Math.abs(dy) < mouse.radius) {
                    const force = (mouse.radius - Math.sqrt(Math.pow(mouse.x - x, 2) + dy*dy)) / mouse.radius;
                    targetTopY += force * 120 * (mouse.y < ((targetTopY + targetBottomY) / 2) ? 1 : -1);
                    targetBottomY += force * 120 * (mouse.y < ((targetTopY + targetBottomY) / 2) ? 1 : -1);
                }
                p.top.update(targetTopY); p.bottom.update(targetBottomY);
            });

            ctx.beginPath(); ctx.moveTo(points[0].top.x, points[0].top.y);
            for (let i = 0; i < points.length - 1; i++) {
                ctx.quadraticCurveTo(points[i].top.x, points[i].top.y, (points[i].top.x + points[i + 1].top.x) / 2, (points[i].top.y + points[i + 1].top.y) / 2);
            }
            ctx.lineTo(points[points.length - 1].top.x, points[points.length - 1].top.y);
            ctx.lineTo(points[points.length - 1].bottom.x, points[points.length - 1].bottom.y);
            for (let i = points.length - 2; i >= 0; i--) {
                ctx.quadraticCurveTo(points[i + 1].bottom.x, points[i + 1].bottom.y, (points[i].bottom.x + points[i + 1].bottom.x) / 2, (points[i].bottom.y + points[i + 1].bottom.y) / 2);
            }
            ctx.lineTo(points[0].bottom.x, points[0].bottom.y); ctx.closePath();
            ctx.fillStyle = '#F40009'; ctx.fill();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        initCanvas(); animate();

        };

        let currentMode = 1;
        let isProcessing = false;
        let refinedQuestion = "";
        let castResults = []; 
        let conversationHistory = []; 

        const chatContainer = document.getElementById('chatContainer');
        const castContainer = document.getElementById('castContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatHistory = document.getElementById('chatHistory');

        // Allow HTML rendering for our specialized tooltip message
        function appendMessage(content, type, isHTML = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            if (isHTML) {
                msgDiv.innerHTML = content;
            } else {
                msgDiv.textContent = content;
            }
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function setLoadingState(isLoading) {
            isProcessing = isLoading;
            chatInput.disabled = isLoading;
            sendBtn.disabled = isLoading;
            chatInput.placeholder = isLoading ? "Processing..." : "Enter parameters...";
            if (!isLoading && currentMode === 1) chatInput.focus();
        }

        function resetSystemState() {
            conversationHistory = [];
            castResults = [];
            refinedQuestion = "";
            currentMode = 1;
            isProcessing = false;
            document.getElementById('castOptions').style.display = 'flex';
            chatInput.disabled = false;
            sendBtn.disabled = false;
        }

        function validateAlternation(history) {
            if (history.length === 0) return [];
            let fixed = [];
            let filtered = history.filter(m => m.content && m.content.trim().length > 0);
            if (filtered.length > 0 && filtered[0].role !== 'user') filtered.shift();
            for (let i = 0; i < filtered.length; i++) {
                if (i === 0 || filtered[i].role !== filtered[i - 1].role) {
                    fixed.push(filtered[i]);
                }
            }
            return fixed;
        }

        async function fetchOracleResponse(apiMessages, maxTokens, mode) {
            const payload = {
                model: "Huggingmaces/diet_coke_oracle_merged", 
                messages: apiMessages,
                max_tokens: maxTokens, 
                temperature: 0.1, 
                frequency_penalty: 0.0, 
                presence_penalty: 0.0,
                stop: ["<end_of_turn>", "<eos>"] 
            };

            const response = await fetch(BACKEND_API_URL, {
                method: 'POST', mode: 'cors',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer EMPTY' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errJson = await response.json().catch(() => ({ message: `HTTP ${response.status}` }));
                throw new Error(errJson.message || "Network Error");
            }
            const data = await response.json();
            
            return data.choices[0].message.content.trim();
        }

        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text || currentMode !== 1 || isProcessing) return;

            appendMessage(text, 'user');
            chatInput.value = '';
            setLoadingState(true);

            conversationHistory.push({ role: "user", content: text });
            
            // Expanded to 10 so the loop breaker actually functions
            if (conversationHistory.length > 10) {
                conversationHistory = conversationHistory.slice(-10);
            }

            let activeHistory = validateAlternation([...conversationHistory]);
            const apiMessages = activeHistory.map((msg, index) => {
                if (index === 0) return { role: 'user', content: PROMPTS.MODE_1 + "\n\n" + msg.content };
                return msg;
            });

            try {
                let reply = await fetchOracleResponse(apiMessages, 150, 1);
                
                if (!reply) throw new Error("Empty response generated.");

                const userTurns = conversationHistory.filter(m => m.role === 'user').length;
                if (userTurns >= 4 && !reply.includes("STATUS: VALIDATED")) {
                    reply = "STATUS: VALIDATED. Proceed to Mode 2 Casting.";
                }

                const isValidated = reply.includes("STATUS: VALIDATED") || reply.includes("Proceed to Mode 2");

                if (isValidated) {
                    refinedQuestion = text; 
                    chatInput.disabled = true;
                    appendMessage("STATUS: VALIDATED. STRUCTURAL CLARITY ACHIEVED.", 'system');
                    setTimeout(() => triggerMode2Casting(), 1500);
                } else {
                    conversationHistory.push({ role: "assistant", content: reply });
                    appendMessage(reply, 'assistant');
                    setLoadingState(false);
                }
            } catch (error) {
                console.error("API Error:", error);
                if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length-1].role === 'user') {
                    conversationHistory.pop();
                }
                appendMessage("[ERR: SYSTEM] ARCHITECTURE UNSTABLE. PLEASE REPHRASE.", 'error');
                setLoadingState(false);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        const CAST_QUESTIONS = [
            ["Does the structure require submission or assertion?", "SUBMIT", "ASSERT"],
            ["Is the tension internal or external?", "INTERNAL", "EXTERNAL"],
            ["Does the architecture demand expansion or contraction?", "EXPAND", "CONTRACT"],
            ["Is the friction conceptual or logistical?", "CONCEPT", "LOGISTIC"],
            ["Does the mandate require speed or endurance?", "SPEED", "ENDURANCE"],
            ["Is the asset public or private?", "PUBLIC", "PRIVATE"]
        ];

        function triggerMode2Casting() {
            currentMode = 2;
            isProcessing = false;
            chatContainer.style.display = 'none';
            castContainer.style.display = 'flex';
            castResults = [];
            document.getElementById('hexagramVisual').innerHTML = '';
            document.getElementById('castOptions').style.display = 'flex';
            updateCastUI();
        }

        function updateCastUI() {
            const step = castResults.length;
            if (step >= 6) {
                revealHexagram();
                return;
            }
            document.getElementById('castProgress').textContent = `LINE ${step + 1} / 6`;
            document.getElementById('castQuestionText').textContent = CAST_QUESTIONS[step][0];
            const btns = document.querySelectorAll('.cast-btn');
            btns[0].textContent = CAST_QUESTIONS[step][1];
            btns[1].textContent = CAST_QUESTIONS[step][2];
        }

        function castLine() {
            if (isProcessing || currentMode !== 2) return;
            const rand = Math.random() * 16;
            let lineValue = 9; 
            if (rand < 1) lineValue = 6; 
            else if (rand < 4) lineValue = 7; 
            else if (rand < 9) lineValue = 8; 

            castResults.push(lineValue);
            const lineDiv = document.createElement('div');
            lineDiv.className = `hex-line ${[6,8].includes(lineValue) ? 'yin' : 'yang'} ${[6,9].includes(lineValue) ? 'changing' : ''}`;
            document.getElementById('hexagramVisual').appendChild(lineDiv);
            updateCastUI();
        }

            "111111": 1, "000000": 2, "100010": 3, "010001": 4, "111010": 5, "010111": 6, "010000": 7, "000010": 8, "111011": 9, "110111": 10, "111000": 11, "000111": 12, "101111": 13, "111101": 14, "001000": 15, "000100": 16, "100110": 17, "011001": 18, "110000": 19, "000011": 20, "100101": 21, "101001": 22, "000001": 23, "100000": 24, "100111": 25, "111001": 26, "100001": 27, "011110": 28, "010010": 29, "101101": 30, "001110": 31, "011100": 32, "001111": 33, "111100": 34, "000101": 35, "101000": 36, "101011": 37, "110101": 38, "001010": 39, "010100": 40, "110001": 41, "100011": 42, "111110": 43, "011111": 44, "000110": 45, "011000": 46, "010110": 47, "011010": 48, "101110": 49, "011101": 50, "100100": 51, "001001": 52, "001011": 53, "110100": 54, "101100": 55, "001101": 56, "011011": 57, "110110": 58, "010011": 59, "110010": 60, "110011": 61, "001100": 62, "101010": 63, "010101": 64
        };

        const HEXAGRAM_NAMES = {
            1: "The Creative", 2: "The Receptive", 3: "Difficulty at the Beginning", 4: "Youthful Folly", 5: "Waiting", 6: "Conflict", 7: "The Army", 8: "Holding Together", 9: "Small Taming", 10: "Treading", 11: "Peace", 12: "Standstill", 13: "Fellowship with Men", 14: "Possession in Great Measure", 15: "Modesty", 16: "Enthusiasm", 17: "Following", 18: "Work on What Has Been Spoiled", 19: "Approach", 20: "Contemplation", 21: "Biting Through", 22: "Grace", 23: "Stripping Away", 24: "Return", 25: "Innocence", 26: "Great Taming", 27: "Nourishment", 28: "Preponderance of the Great", 29: "The Abysmal", 30: "The Clinging", 31: "Influence", 32: "Duration", 33: "Retreat", 34: "Great Power", 35: "Progress", 36: "Darkening of the Light", 37: "The Family", 38: "Opposition", 39: "Obstruction", 40: "Deliverance", 41: "Decrease", 42: "Increase", 43: "Breakthrough", 44: "Coming to Meet", 45: "Gathering Together", 46: "Pushing Upward", 47: "Oppression", 48: "The Well", 49: "Revolution", 50: "The Cauldron", 51: "The Arousing", 52: "Keeping Still", 53: "Development", 54: "The Marrying Maiden", 55: "Abundance", 56: "The Wanderer", 57: "The Gentle", 58: "The Joyous", 59: "Dispersion", 60: "Limitation", 61: "Inner Truth", 62: "Preponderance of the Small", 63: "After Completion", 64: "Before Completion"
        };

        function getHexagramDetails() {
            let binaryString = "";
            let changingLines = [];
            castResults.forEach((val, i) => {
                binaryString += (val === 7 || val === 9) ? "1" : "0";
                if (val === 6 || val === 9) changingLines.push(i + 1);
            });
            const hexNum = HEXAGRAM_MAP[binaryString];
            const hexName = HEXAGRAM_NAMES[hexNum] || "Unknown Node";
            const linesText = changingLines.length > 0 ? changingLines.join(", ") : "None";
            return { hexNum, hexName, linesText };
        }

        function revealHexagram() {
            isProcessing = true; 
            const details = getHexagramDetails();
            
            document.getElementById('castProgress').textContent = `GEOMETRY LOCKED`;
            document.getElementById('castOptions').style.display = 'none'; 
            
            document.getElementById('castQuestionText').innerHTML = `
                <div class="revelation-text">
                    <div class="revelation-num">${details.hexNum < 10 ? '0'+details.hexNum : details.hexNum}</div>
                    <div class="revelation-name">${details.hexName.toUpperCase()}</div>
                    <div class="revelation-lines">CHANGING LINES: ${details.linesText}</div>
                </div>
            `;

            setTimeout(() => { triggerMode3Interpretation(details); }, 3500);
        }

        async function triggerMode3Interpretation(details) {
            currentMode = 3;
            
            castContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            
            const wilhelmData = WILHELM_DATA[details.hexNum];
            
            // Build the system message with an embedded, modern accordion instead of a tooltip
            const systemMsgHTML = `
                MODE 2 COMPLETE. ASSIGNED NODE: ${details.hexNum} - ${details.hexName.toUpperCase()}.<br>
                <details class="wilhelm-accordion" ontoggle="setTimeout(() => document.getElementById('chatHistory').scrollTop = document.getElementById('chatHistory').scrollHeight, 10)">
                    <summary class="wilhelm-summary">[VIEW WILHELM ARCHIVE]</summary>
                    <div class="wilhelm-content">
                        <div class="wilhelm-section"><strong>THE JUDGEMENT</strong>${wilhelmData.judgement}</div>
                        <div class="wilhelm-section"><strong>THE IMAGE</strong>${wilhelmData.image}</div>
                    </div>
                </details>
                ANALYZING ARCHITECTURE...
            `;
            
            // Render the specific HTML for the accordion injection
            appendMessage(systemMsgHTML, 'system', true);

            const mode3Payload = `[INPUT: ${refinedQuestion} HEXAGRAM: ${details.hexNum} (${details.hexName}). CHANGING LINES: ${details.linesText}.]`;
            const apiMessages = [ { role: "user", content: PROMPTS.MODE_3 + "\n\n" + mode3Payload } ];

            try {
                const finalRuling = await fetchOracleResponse(apiMessages, 800, 3);
                appendMessage(finalRuling, 'assistant');
                appendMessage("PROTOCOL COMPLETE. AWAITING NEW INQUIRY.", 'system');
            } catch (error) {
                console.error(error);
                appendMessage("[ERR: SYSTEM] INTERPRETATION FAILED.", 'error');
            } finally {
                resetSystemState();
            }
        }

        initCanvas(); animate();
    </script>
